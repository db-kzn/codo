    <script type="text/javascript">
        // GitHub Pages redirection script for SPA
        (function () {
            var pathSegmentsToKeep = 0; // Adjust this if using a custom domain or subdirectory
            
            var l = window.location;
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function (v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (q.q ? ('?' + q.q) : '') +
                        l.hash
                    );
                }
            }
        }());
    </script>
